# Claude Status Tidbyt — local configuration.
# Copy to config.yaml and fill in your values. config.yaml is gitignored.

# Tidbyt API token — from `pixlet auth` or your Tidbyt account page.
tidbyt_api_key: "YOUR-TIDBYT-KEY-HERE"

# Tidbyt device ID — from `pixlet devices` or the mobile app's settings.
tidbyt_device_id: "YOUR-DEVICE-ID"

# Installation ID — alphanumeric only (a-z, A-Z, 0-9), per Tidbyt's API.
tidbyt_installation_id: "claudestat"
